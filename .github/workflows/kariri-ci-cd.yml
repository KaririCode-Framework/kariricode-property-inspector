name: Kariri CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ["8.4"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, pcov
          coverage: pcov

      - name: Install project dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Download kcode.phar
        run: |
          curl -fsSL https://github.com/KaririCode-Framework/kariricode-devkit/releases/latest/download/kcode.phar \
            -o /usr/local/bin/kcode
          chmod +x /usr/local/bin/kcode
          kcode --version

      - name: Initialize DevKit toolchain
        run: kcode init --skip-install

      - name: Run quality pipeline
        run: kcode quality
