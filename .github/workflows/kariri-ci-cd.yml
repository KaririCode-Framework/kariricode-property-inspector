name: Kariri CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality — PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.4"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, pcov
          coverage: pcov

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install project dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Download kcode
        run: |
          curl -fsSL \
            https://github.com/KaririCode-Framework/kariricode-devkit/releases/latest/download/kcode.phar \
            -o /usr/local/bin/kcode
          chmod +x /usr/local/bin/kcode
          kcode --version

      - name: Cache DevKit toolchain
        uses: actions/cache@v4
        id: kcode-cache
        with:
          path: .kcode/vendor
          key: kcode-${{ matrix.php }}-${{ hashFiles('.kcode/composer.lock') }}
          restore-keys: kcode-${{ matrix.php }}-

      - name: Initialize DevKit toolchain
        run: kcode init ${{ steps.kcode-cache.outputs.cache-hit == 'true' && '--skip-install' || '' }}

      - name: Run coding standards check
        run: kcode cs:fix --check

      - name: Run static analysis
        run: kcode analyse

      - name: Run test suite
        run: kcode test
